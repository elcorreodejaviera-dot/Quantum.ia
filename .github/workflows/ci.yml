name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Typecheck (Convex)
        run: npm run typecheck

      # Solo compila el frontend; NO usa `npm run build` (que despliega Convex).
      - name: Build frontend (sin deploy de Convex)
        run: npx vite build

      # (JAV-39 #21/#22) Audit no bloqueante por la vuln conocida de `ws` vía Convex (high):
      # falla solo ante CRITICAL. Tras JAV-39 #22 (bump de Convex) endurecer a `--audit-level=high`.
      - name: npm audit
        run: npm audit --audit-level=critical
