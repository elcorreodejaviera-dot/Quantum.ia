<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantum.ia | Página no encontrada</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --text: #ffffff;
      --muted: #b7bdb9;
      --green: #00c805;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(100%, 420px);
      padding: 24px;
      text-align: center;
    }

    .dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 10px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(0, 200, 5, 0.12);
      vertical-align: middle;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    a {
      color: #050505;
      background: var(--green);
      display: inline-flex;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1><span class="dot"></span>Quantum.ia</h1>
    <p>Página no encontrada.</p>
    <a href="/">Volver al portal</a>
  </main>
</body>
</html>
